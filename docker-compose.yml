services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jira-lite-mvp-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jira_lite_mvp?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-me}
    ports:
      - "3000:3000"
    volumes:
      - ./backups:/app/backups
      - ./public/uploads:/app/public/uploads

  postgres:
    image: postgres:16-alpine
    container_name: jira-lite-mvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_lite_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jira_lite_mvp"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
